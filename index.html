<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroPulse: Memory Challenge</title>

  <link rel="stylesheet" href="styles.css">

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500&family=Pacifico&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

  <div id="start-screen" class="screen">
    <h1>Simon Game 🎮</h1>
    <input type="text" id="player-name" placeholder="Enter your name">
    <button id="start-btn">Start Game</button>

    <div class="instructions">
      <h3>How to Play</h3>
      <p>
        🎯 Memorize the flashing color pattern.<br>
        🧠 Repeat it in the same order.<br>
        ⚡ Each level gets harder!<br>
        ❌ One mistake = Game Over.<br><br>
        🚀 How far can you go?
      </p>
    </div>
  </div>

  <div id="game-screen" class="screen hidden">
    <h2 id="level-title"></h2>
    <h3 id="score"></h3>

    <div class="container">
      <div class="row">
        <div id="green" class="btn green"></div>
        <div id="red" class="btn red"></div>
      </div>
      <div class="row">
        <div id="yellow" class="btn yellow"></div>
        <div id="blue" class="btn blue"></div>
      </div>
    </div>
  </div>

  <div id="gameover-screen" class="screen hidden">
    <h2 class="gameover-title">Game Over</h2>
    <h3 id="final-score" class="final-score"></h3>

    <div class="leaderboard-box">
      <h3 class="leaderboard-title">🏆 Leaderboard</h3>
      <ul id="leaderboard"></ul>
    </div>

    <button id="restart-btn">Play Again</button>
  </div>

</div>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="index.js"></script>

</body>
</html>
